---
AWSTemplateFormatVersion: '2010-09-09'
Description: VPC and networking infrastructure for AWS PCS private cluster with no internet access.

### This template creates a fully private VPC and subnet for AWS Parallel Computing Service (PCS) clusters with no internet connectivity.
### Private subnets are configured for isolated workloads that communicate only within the VPC or through VPC endpoints.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: VPC Configuration
        Parameters:
          - VpcCIDR
          - StackName
      - Label:
          default: Subnet Configuration
        Parameters:
          - SubnetAZ
          - SubnetCIDR

Parameters:
  StackName:
    Description: Parent stack name for resource naming
    Type: String

  VpcCIDR:
    Description: CIDR block for the VPC (e.g., 10.0.0.0/16)
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: '((\d{1,3})\.){3}\d{1,3}/\d{1,2}'
    ConstraintDescription: Must be a valid IP CIDR range of the form x.x.x.x/x

  SubnetAZ:
    Description: Availability Zone for the private subnet
    Type: AWS::EC2::AvailabilityZone::Name

  SubnetCIDR:
    Description: CIDR block for the private subnet (e.g., 10.0.0.0/20)
    Type: String
    Default: 10.0.0.0/20
    AllowedPattern: '((\d{1,3})\.){3}\d{1,3}/\d{1,2}'
    ConstraintDescription: Must be a valid IP CIDR range of the form x.x.x.x/x

Resources:
  # VPC
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${StackName}-PrivatePcsVpc'
        - Key: Stack
          Value: !Ref AWS::StackId

  # Private Subnet
  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Ref SubnetAZ
      CidrBlock: !Ref SubnetCIDR
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${StackName}-PrivateSubnet-${SubnetAZ}'
        - Key: Stack
          Value: !Ref AWS::StackId

  # Route Table for Subnet
  RouteTablePrivate:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub '${StackName}-PrivateRouteTable'
        - Key: Stack
          Value: !Ref AWS::StackId

  # Route Table Association for Subnet
  RouteAssociationPrivate:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref RouteTablePrivate

Outputs:
  VpcId:
    Description: ID of the VPC
    Value: !Ref Vpc

  PrivateSubnetId:
    Description: ID of the private subnet
    Value: !Ref PrivateSubnet

  PrivateSubnetAZ:
    Description: Availability Zone of the private subnet
    Value: !Ref SubnetAZ
